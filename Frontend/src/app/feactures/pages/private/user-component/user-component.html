<div class="users-container">
  <!-- Header -->
  <div class="users-header">
    <div>
      <h1>Users Management</h1>
      <p>Manage all registered users on the platform</p>
    </div>

    <button mat-raised-button color="primary" class="add-btn">
      <mat-icon>person_add</mat-icon>
      Add User
    </button>
  </div>

  <!-- Filters -->
  <mat-card class="filters-card">
    <div class="filters">
      <!-- Search -->
      <div class="search-box">
        <mat-icon>search</mat-icon>

        <input type="text" placeholder="Search users..." />
      </div>

      <!-- Role Filter -->
      <button mat-stroked-button>
        <mat-icon>filter_list</mat-icon>
        All Roles
      </button>
    </div>
  </mat-card>

  <!-- Users Table -->
  <mat-card class="table-card">
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Games</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>
            <div class="user-info">
              <img src="https://i.pravatar.cc/150?img=15" alt="user" />

              <div>
                <h4>Jefferson Veloz</h4>
                <span>@jefferson</span>
              </div>
            </div>
          </td>

          <td>jefferson@gmail.com</td>

          <td>
            <span class="role admin"> Admin </span>
          </td>

          <td>
            <span class="status active"> Active </span>
          </td>

          <td>24 Games</td>

          <td>
            <div class="actions">
              <button mat-icon-button>
                <mat-icon>visibility</mat-icon>
              </button>

              <button mat-icon-button color="primary">
                <mat-icon>edit</mat-icon>
              </button>

              <button mat-icon-button color="warn">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        </tr>

        <!-- USER 2 -->

        <tr>
          <td>
            <div class="user-info">
              <img src="https://i.pravatar.cc/150?img=32" alt="user" />

              <div>
                <h4>Maria Lopez</h4>
                <span>@maria</span>
              </div>
            </div>
          </td>

          <td>maria@gmail.com</td>

          <td>
            <span class="role user"> User </span>
          </td>

          <td>
            <span class="status inactive"> Inactive </span>
          </td>

          <td>10 Games</td>

          <td>
            <div class="actions">
              <button mat-icon-button>
                <mat-icon>visibility</mat-icon>
              </button>

              <button mat-icon-button color="primary">
                <mat-icon>edit</mat-icon>
              </button>

              <button mat-icon-button color="warn">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </mat-card>
</div>
