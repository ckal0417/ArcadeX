<div class="form-container">
  <h2>{{ data ? 'Editar Usuario' : 'Crear Usuario' }}</h2>

  <form [formGroup]="userForm">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Correo Electrónico</mat-label>
      <input matInput type="email" formControlName="email" placeholder="usuario@email.com" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre de Usuario</mat-label>
      <input matInput formControlName="username" placeholder="nombre_usuario" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Rol</mat-label>
      <mat-select formControlName="role">
        <mat-option *ngFor="let role of roles" [value]="role">
          {{ role | uppercase }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <div class="form-actions">
      <button mat-raised-button color="primary" (click)="onSubmit()">
        {{ data ? 'Actualizar' : 'Crear' }}
      </button>
      <button mat-stroked-button (click)="cancel()">Cancelar</button>
    </div>
  </form>
</div>
