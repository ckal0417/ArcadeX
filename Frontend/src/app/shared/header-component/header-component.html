<mat-toolbar class="topbar">

  <button class="toggle-navbar" (click)="toggleNavbar()">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="brand">
    <img
      src="./assets/branding/texto-completo.png"
      alt="ArcadeX"
      class="brand-logo"
    />
  </div>

  <div class="search-box">
    <mat-icon>search</mat-icon>
    <input
      type="text"
      placeholder="Buscar juegos, DLC, categorías..."
    />
  </div>

  <div class="topbar-actions">
    <button matButton class="login" routerLink="/login">
      Iniciar sesión
    </button>
  </div>

</mat-toolbar>
