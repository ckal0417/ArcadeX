<mat-toolbar class="topbar">
  <div class="logo">
    <mat-icon>sports_esports</mat-icon>
    <span matButton class="title">ArcadeX</span>
  </div>

  <div class="search-box">
    <mat-icon>search</mat-icon>
    <input
      (focus)="searchFocused = true"
      (blur)="searchFocused = false"
      type="text"
      placeholder="Buscar juegos, DLC, categorías..."
    />
  </div>

  <div class="topbar-actions">
    <button matButton class="login" routerLink="/login">Iniciar sesion</button>
  </div>
</mat-toolbar>
